<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Modern Weather App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importing a nice font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false">
        <button class="search-btn"><img src="https://cdn-icons-png.flaticon.com/512/149/149852.png"
                alt="search"></button>
        <button class="location-btn" title="Detect my location">
            <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="location">
        </button>
    </div>

    <div class="error">
        <p>Invalid city name</p>
    </div>

    <div class="weather">
        <img src="https://openweathermap.org/img/wn/04d@2x.png" class="weather-icon">
        <h1 class="temp">22°c</h1>
        <h2 class="city">New York</h2>

        <div class="details">
            <div class="col">
                <img src="https://cdn-icons-png.flaticon.com/512/3262/3262966.png" class="icon-detail">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="https://cdn-icons-png.flaticon.com/512/136/136712.png" class="icon-detail">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
